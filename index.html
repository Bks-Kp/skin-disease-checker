<!DOCTYPE html>
<html>
<head>
<title>Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<!-- HOME -->
<div id="home">
<h2>Home</h2>
<button onclick="goPatient()">Patient</button>
<button onclick="goDoctor()">Doctor</button>
</div>

<!-- PATIENT -->
<div id="patient" style="display:none;">
<h2>Patient Form</h2>

<input id="name" placeholder="Name"><br>
<input id="age" placeholder="Age"><br>

<select id="severity">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select><br>

<label><input type="checkbox" value="itch"> Itch</label><br>
<label><input type="checkbox" value="pimple"> Pimple</label><br>
<label><input type="checkbox" value="ring"> Ring</label><br>

<button onclick="analyze()">Submit</button>
<button onclick="goHome()">Back</button>
</div>

<!-- LOGIN -->
<div id="login" style="display:none;">
<h2>Doctor Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
<button onclick="goHome()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
<h2>Doctor Dashboard</h2>
<div id="dashContent"></div>
<button onclick="goHome()">Logout</button>
</div>

<!-- REPORT -->
<div id="report" style="display:none;">
<h2>Prescription</h2>
<div id="reportData"></div>
<button onclick="goHome()">Done</button>
</div>

<script>

/* NAVIGATION */
function goHome(){
show("home");
}

function goPatient(){
show("patient");
}

function goDoctor(){
show("login");
}

function show(page){
document.getElementById("home").style.display="none";
document.getElementById("patient").style.display="none";
document.getElementById("login").style.display="none";
document.getElementById("dashboard").style.display="none";
document.getElementById("report").style.display="none";

document.getElementById(page).style.display="block";
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let severity=document.getElementById("severity").value;

let symptoms=[...document.querySelectorAll("input[type=checkbox]:checked")].map(x=>x.value);

if(!name){alert("Enter name");return;}

let disease="General";
if(symptoms.includes("pimple")) disease="Acne";
if(symptoms.includes("ring")) disease="Fungal";
if(symptoms.includes("itch")) disease="Eczema";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({
name:name,
age:age,
severity:severity,
disease:disease,
date:new Date().toLocaleDateString()
});
localStorage.setItem("patients",JSON.stringify(data));

/* REPORT */
document.getElementById("reportData").innerHTML=
"Name: "+name+"<br>"+
"Age: "+age+"<br>"+
"Disease: "+disease;

show("report");
}

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="Kalpana" && p==="Project"){
loadDashboard();
}else{
alert("Wrong login");
}
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let today=new Date().toLocaleDateString();

let todayList=data.filter(p=>p.date===today);

let html="Total Today: "+todayList.length+"<br><br>";

todayList.forEach(p=>{
html+=p.name+" - "+p.disease+"<br>";
});

document.getElementById("dashContent").innerHTML=html;

show("dashboard");
}

</script>

</body>
</html>

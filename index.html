<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Skin Checker</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color: white;
    }
    .container {
      max-width: 520px;
      margin: 30px auto;
      background: rgba(255,255,255,0.08);
      padding: 20px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    h2 { margin-bottom: 10px; }
    input, select, textarea {
      width: 100%;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }
    #result {
      margin-top: 15px;
      background: rgba(0,0,0,0.4);
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
    .loader { margin-top:10px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🧠 AI Skin Checker</h2>

  <input type="file" id="image" accept="image/*">
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="age" placeholder="Age">

  <select id="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>

  <input type="text" id="duration" placeholder="Since when">
  <textarea id="symptoms" placeholder="Symptoms"></textarea>
  <input type="text" id="area" placeholder="Affected area">
  <textarea id="medication" placeholder="Previous medication"></textarea>

  <button onclick="analyze()">Analyze</button>
  <div id="result"></div>
</div>

<script>
async function analyze() {
  const resultDiv = document.getElementById("result");

  const file = document.getElementById("image").files[0];
  if (!file) {
    resultDiv.innerText = "Please upload an image";
    return;
  }

  resultDiv.innerHTML = "⏳ Analyzing...";

  const reader = new FileReader();

  reader.onload = async function() {
    const base64Image = reader.result.split(',')[1];

    try {
      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_API_KEY"
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [
            {
              role: "user",
              content: [
                {
                  type: "text",
                  text: `You are NOT a doctor. Analyze safely.

User Details:
Name: ${name.value}
Age: ${age.value}
Gender: ${gender.value}
Duration: ${duration.value}
Symptoms: ${symptoms.value}
Area: ${area.value}
Medication: ${medication.value}

Give:
1. Possible condition (not diagnosis)
2. Severity (Low/Medium/High)
3. Safe care tips (no prescriptions)
4. Strictly say consult doctor`
                },
                {
                  type: "image_url",
                  image_url: { url: `data:image/jpeg;base64,${base64Image}` }
                }
              ]
            }
          ]
        })
      });

      const data = await response.json();

      if (data.error) {
        resultDiv.innerText = "Error: " + data.error.message;
        return;
      }

      resultDiv.innerText = data.choices[0].message.content;
    } catch (err) {
      resultDiv.innerText = "Something went wrong";
    }
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>

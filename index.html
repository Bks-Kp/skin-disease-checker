<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

/* HOME */
.home{
text-align:center;
margin-top:120px;
}
.home button{
width:60%;
margin:10px auto;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
}

/* GRID */
.form-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}
@media(max-width:600px){
.form-grid{grid-template-columns:1fr;}
}

/* INPUT */
input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#38bdf8,#06b6d4);
color:white;
cursor:pointer;
font-weight:bold;
}

/* SYMPTOMS */
.symptom-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}
.symptom-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
height:50px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:90%;
max-width:650px;
max-height:85vh;
overflow:auto;
}

/* DASHBOARD */
.card{
background:#f1f5f9;
color:black;
padding:10px;
margin:10px 0;
border-radius:10px;
}

/* GRAPH */
.bar{
height:8px;
background:#38bdf8;
margin:5px 0;
border-radius:5px;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="showPatient()">👤 Patient</button>
<button onclick="showDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
<h2>👨‍⚕️ Doctor Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- PATIENT -->
<div id="app" class="container hidden">

<h2 style="text-align:center;">🧠 Skin Disease Analyzer</h2>

<div class="form-grid">
<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option>Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
<option>Feet</option>
<option>Back</option>
<option>Full Body</option>
</select>

<select id="severity">
<option>Severity</option>
<option value="low">Mild</option>
<option value="medium">Moderate</option>
<option value="high">Severe</option>
</select>
</div>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">
<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>
<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>
<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>
<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>
<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>
</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="goHome()">⬅ Back</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-content" id="resultBox">
<div id="result"></div>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* NAVIGATION */
function showPatient(){
document.getElementById("home").style.display="none";
document.getElementById("app").style.display="block";
}

function showDoctor(){
document.getElementById("home").style.display="none";
document.getElementById("login").style.display="block";
}

function goHome(){
location.reload();
}

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
document.getElementById("login").style.display="none";
loadDashboard();
}else{
alert("Invalid Login ❌");
}
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let severity=document.getElementById("severity").value;
let location=document.getElementById("location").value;

if(!name){alert("Enter name");return;}

let symptoms=[...document.querySelectorAll(".symptom-item input:checked")].map(x=>x.value);

if(symptoms.length===0){
alert("Select symptoms");
return;
}

let scores={eczema:0,acne:0,fungal:0,bacterial:0,pigmentation:0};

symptoms.forEach(s=>{
if(["itch","dry","redness"].includes(s)) scores.eczema+=2;
if(["pimple","blackhead"].includes(s)) scores.acne+=2;
if(["ring","scaling"].includes(s)) scores.fungal+=3;
if(["pus"].includes(s)) scores.bacterial+=3;
if(["dark"].includes(s)) scores.pigmentation+=2;
});

let total=Object.values(scores).reduce((a,b)=>a+b,0);
let disease=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

let names={
eczema:"Eczema",
acne:"Acne",
fungal:"Fungal Infection",
bacterial:"Bacterial Infection",
pigmentation:"Pigmentation"
};

/* GRAPH */
let graph="";
for(let k in scores){
let p=total?Math.round(scores[k]/total*100):0;
graph+=`${names[k]} (${p}%)<div class="bar" style="width:${p}%"></div>`;
}

/* REPORT (UPGRADED) */
document.getElementById("result").innerHTML=`
<h2 style="text-align:center;">🧾 Diagnosis Report</h2>

<p>👤 <b>Name:</b> ${name}</p>
<p>🎂 <b>Age:</b> ${age}</p>
<p>📍 <b>Location:</b> ${location}</p>
<p>⚠️ <b>Severity:</b> ${severity}</p>
<p>🦠 <b>Condition:</b> ${names[disease]}</p>

<hr>

<h3>📊 Analysis</h3>
${graph}

<hr>

<h3>💊 Treatment Guidance</h3>
<p>✔ Maintain proper hygiene</p>
<p>✔ Avoid touching infected area</p>

<h3>🛡 Precautions</h3>
<p>✔ Keep skin dry & clean</p>
<p>✔ Avoid sharing personal items</p>

<h3>⏳ Recovery</h3>
<p>1–2 weeks (depends on severity)</p>

<h3>🚨 When to see doctor</h3>
<p>${severity==="high"?"⚠ Immediate consultation required":"Visit if symptoms persist"}</p>

<p style="color:red;">⚠ This is not a medical diagnosis</p>
`;

document.getElementById("popup").style.display="flex";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({name,age,disease:names[disease],date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(data));
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2 style='text-align:center;'>👨‍⚕️ Doctor Dashboard</h2>";

html+=`<p><b>Total Patients:</b> ${data.length}</p>`;

data.forEach(p=>{
html+=`<div class="card">👤 ${p.name} (${p.age})<br>🦠 ${p.disease}<br>📅 ${p.date}</div>`;
});

html+=`<button onclick="closePopup()">❌ Close</button>`;

document.getElementById("result").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

/* CLOSE */
function closePopup(){
document.getElementById("popup").style.display="none";
goHome();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Skin Checker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #1e293b;
      color: white;
      padding: 20px;
    }

    input, textarea, button {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    img {
      margin-top: 10px;
      max-width: 250px;
      border-radius: 10px;
    }

    #result {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>🧠 Skin Disease Checker</h2>

<input type="file" id="image" accept="image/*"><br>
<img id="preview" />

<textarea id="symptoms" placeholder="Enter symptoms (itching, red spots, acne etc)"></textarea>

<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>

// IMAGE PREVIEW
document.getElementById("image").addEventListener("change", function() {
  const file = this.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById("preview").src = e.target.result;
  };

  if (file) reader.readAsDataURL(file);
});

// ANALYZE FUNCTION
function analyze() {
  const symptoms = document.getElementById("symptoms").value.toLowerCase();
  const result = document.getElementById("result");

  let output = "";

  if (symptoms.includes("itch") || symptoms.includes("rash")) {
    output = `
🔍 Possible Condition: Eczema / Allergy

📊 Severity: Medium

💡 Common Info (like Google):
- Often caused by irritation or allergy
- Symptoms include itching, redness

🧴 Care Tips:
- Use moisturizer
- Avoid harsh soaps

⚠️ Consult a dermatologist
`;
  }

  else if (symptoms.includes("pimple") || symptoms.includes("acne")) {
    output = `
🔍 Possible Condition: Acne

📊 Severity: Low

💡 Common Info:
- Caused by clogged pores
- Common in teenagers

🧴 Care Tips:
- Keep face clean
- Avoid oily products

⚠️ Consult a dermatologist
`;
  }

  else if (symptoms.includes("white") || symptoms.includes("patch")) {
    output = `
🔍 Possible Condition: Fungal Infection

📊 Severity: Medium

💡 Common Info:
- Caused by fungus in moist areas

🧴 Care Tips:
- Keep skin dry
- Maintain hygiene

⚠️ Consult a doctor
`;
  }

  else {
    output = `
🤔 Unable to detect clearly

💡 Suggestion:
- Try adding more symptoms
- Consult a dermatologist
`;
  }

  result.innerText = output;
}

</script>

</body>
</html>

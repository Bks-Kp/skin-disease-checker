<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

.card{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:15px;
}

.home{text-align:center;margin-top:120px;}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
}

input,select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
}

.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

.symptom-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.symptom-item{
display:flex;
justify-content:space-between;
padding:10px;
background:#1e293b;
border-radius:10px;
}

/* POPUP */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:90%;
max-width:650px;
max-height:85vh;
overflow:auto;
}

.hidden{display:none;}

.patient-card{
background:#f1f5f9;
color:black;
padding:10px;
margin:8px 0;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="openPatient()">👤 Patient</button>
<button onclick="openDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="login" class="card hidden">
<h2>Doctor Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PATIENT -->
<div id="patient" class="card hidden">

<h2>Skin Form</h2>

<input id="name" placeholder="Name">

<div class="row">
<input id="age" placeholder="Age">

<select id="location">
<option>Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
</select>

<select id="severity">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>

<h3>Symptoms</h3>

<div class="symptom-grid">
<div class="symptom-item">Itch <input type="checkbox" value="itch"></div>
<div class="symptom-item">Pimple <input type="checkbox" value="pimple"></div>
<div class="symptom-item">Ring <input type="checkbox" value="ring"></div>
<div class="symptom-item">Dry <input type="checkbox" value="dry"></div>
</div>

<button onclick="analyze()">Analyze</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-box" id="output"></div>
</div>

<script>

/* NAV */
function openPatient(){
home.style.display="none";
patient.classList.remove("hidden");
}

function openDoctor(){
home.style.display="none";
login.classList.remove("hidden");
}

/* LOGIN */
function login(){
if(user.value==="Kalpana" && pass.value==="Project"){
loadDashboard();
}else alert("Wrong login");
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let location=document.getElementById("location").value;
let severity=document.getElementById("severity").value;

let symptoms=[...document.querySelectorAll(".symptom-item input:checked")].map(x=>x.value);

if(!name){alert("Enter name");return;}
if(symptoms.length===0){alert("Select symptoms");return;}

let disease="General Skin Issue";
if(symptoms.includes("pimple")) disease="Acne";
if(symptoms.includes("ring")) disease="Fungal Infection";
if(symptoms.includes("itch")) disease="Eczema";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({
name,age,location,severity,disease,date:new Date().toLocaleDateString()
});
localStorage.setItem("patients",JSON.stringify(data));

/* PRESCRIPTION */
output.innerHTML=`
<h2 style="text-align:center;">🏥 Kalpana Skin Clinic</h2>
<p><b>Doctor:</b> Mrs. Kalpana Bharath</p>

<hr>

<p><b>Patient:</b> ${name}</p>
<p><b>Age:</b> ${age}</p>
<p><b>Condition:</b> ${disease}</p>

<hr>

<p>💊 Advice: Maintain hygiene</p>
<p>🛡 Precautions: Avoid touching area</p>
<p>⏳ Recovery: 1-2 weeks</p>

<button onclick="window.print()">Download</button>
<button onclick="closePopup()">Close</button>
`;

popup.style.display="flex";
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let today=new Date().toLocaleDateString();

let todayPatients=data.filter(p=>p.date===today);

/* Severity Count */
let severityCount={low:0,medium:0,high:0};

todayPatients.forEach(p=>{
severityCount[p.severity]++;
});

/* Top 5 */
let top5=todayPatients.slice(-5).reverse();

let html=`
<h2>Doctor Dashboard</h2>

<p><b>Patients Today:</b> ${todayPatients.length}</p>

<p><b>Severity:</b></p>
Low: ${severityCount.low} <br>
Medium: ${severityCount.medium} <br>
High: ${severityCount.high}

<hr>

<h3>Top 5 Patients</h3>
`;

top5.forEach(p=>{
html+=`
<div class="patient-card" onclick="viewPatient('${p.name}','${p.age}','${p.disease}','${p.location}','${p.severity}')">
${p.name} (${p.age}) - ${p.disease}
</div>`;
});

html+=`<button onclick="closePopup()">Close</button>`;

output.innerHTML=html;
popup.style.display="flex";
}

/* VIEW DETAILS */
function viewPatient(name,age,disease,location,severity){

output.innerHTML=`
<h2>Patient Details</h2>

<p><b>Name:</b> ${name}</p>
<p><b>Age:</b> ${age}</p>
<p><b>Location:</b> ${location}</p>
<p><b>Severity:</b> ${severity}</p>
<p><b>Disease:</b> ${disease}</p>

<button onclick="closePopup()">Close</button>
`;
}

/* CLOSE */
function closePopup(){
popup.style.display="none";
location.reload();
}

</script>

</body>
</html>

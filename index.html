<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BACKGROUND */
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  margin:0;
  padding:20px;
}

/* CONTAINER */
.container {
  max-width:900px;
  margin:auto;
  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:15px;
  box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

/* HOME SCREEN */
.home {
  text-align:center;
  margin-top:120px;
}

.home button{
  width:60%;
  margin:10px auto;
}

/* INPUTS */
input, select {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#38bdf8,#06b6d4);
  color:white;
}

/* 🔥 FIXED PRO GRID */
.symptom-grid {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:12px;
}

.symptom-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  height:50px; /* FIXED HEIGHT */
  background:rgba(255,255,255,0.08);
  border-radius:10px;
}

.symptom-item input {
  width:18px;
  height:18px;
}

/* MOBILE */
@media(max-width:600px){
  .symptom-grid{
    grid-template-columns:1fr;
  }
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:90%;
  max-width:600px;
}

/* GRAPH */
.bar {
  height:10px;
  background:#38bdf8;
  margin:5px 0;
  border-radius:5px;
}

/* LOGIN */
.login {
  max-width:400px;
  margin:auto;
  margin-top:100px;
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:12px;
}

.hidden { display:none; }

</style>
</head>

<body>

<!-- 🏠 HOME SCREEN -->
<div id="homePage" class="home">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="goPatient()">👤 Patient</button>
<button onclick="goDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="loginPage" class="login hidden">
<h2>👨‍⚕️ Doctor Login</h2>

<input id="username" placeholder="👤 Username">
<input id="password" type="password" placeholder="🔒 Password">

<button onclick="login()">Login</button>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

<h2 style="text-align:center;">🧠 Kalpana Skin Clinic</h2>

<input id="name" placeholder="👤 Name">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option value="">📍 Body Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
<option>Feet</option>
<option>Back</option>
<option>Full Body</option>
</select>

<select id="severity">
<option value="">⚠️ Severity</option>
<option value="low">Mild</option>
<option value="medium">Moderate</option>
<option value="high">Severe</option>
</select>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">

<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>

<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>

<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>

<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>

<div class="symptom-item">Dark Spots <input type="checkbox" value="dark"></div>

</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="goHome()">⬅ Back</button>

</div>

<!-- RESULT -->
<div id="popup" class="modal">
<div class="modal-content" id="report">
<div id="result"></div>
<button onclick="downloadPDF()">📄 Download PDF</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* NAVIGATION */
function goPatient(){
document.getElementById("homePage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
}

function goDoctor(){
document.getElementById("homePage").classList.add("hidden");
document.getElementById("loginPage").classList.remove("hidden");
}

function goHome(){
location.reload();
}

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
loadPatients();
}else{
alert("Invalid Login ❌");
}
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
if(!name){alert("Enter name");return;}

let severity=document.getElementById("severity").value;

let symptoms=[...document.querySelectorAll(".symptom-item input:checked")]
.map(x=>x.value);

let scores={eczema:0,acne:0,fungal:0,bacterial:0,pigmentation:0};

symptoms.forEach(s=>{
if(["itch","dry","redness"].includes(s)) scores.eczema+=2;
if(["pimple","blackhead"].includes(s)) scores.acne+=2;
if(["ring","scaling"].includes(s)) scores.fungal+=3;
if(["pus"].includes(s)) scores.bacterial+=3;
if(["dark"].includes(s)) scores.pigmentation+=2;
});

let total=Object.values(scores).reduce((a,b)=>a+b,0);
let disease=Object.keys(scores).reduce((a,b)=>scores[a]>scores[b]?a:b);

let names={
eczema:"Eczema",
acne:"Acne",
fungal:"Fungal Infection",
bacterial:"Bacterial Infection",
pigmentation:"Pigmentation"
};

let graph="";
for(let key in scores){
let percent=total?Math.round((scores[key]/total)*100):0;
graph+=`<div>${names[key]} (${percent}%)<div class="bar" style="width:${percent}%"></div></div>`;
}

document.getElementById("result").innerHTML=`
<h3 style="text-align:center;">🧾 Diagnosis Report</h3>
<p><b>👤 Name:</b> ${name}</p>
<p><b>🦠 Condition:</b> ${names[disease]}</p>
<p><b>⚠️ Severity:</b> ${severity}</p>
<hr>
${graph}
<hr>
<p><b>💊 Advice:</b> Maintain hygiene</p>
<p><b>🛡 Precautions:</b> Avoid touching area</p>
<p><b>👨‍⚕️ Doctor:</b> Consult if severe</p>
`;

document.getElementById("popup").style.display="flex";
}

/* DASHBOARD */
function loadPatients(){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("popup").style.display="flex";
document.getElementById("result").innerHTML="<h2>👨‍⚕️ Doctor Dashboard (Coming Soon)</h2>";
}

/* CLOSE */
function closePopup(){
document.getElementById("popup").style.display="none";
}

/* PDF */
function downloadPDF(){
html2pdf().from(document.getElementById("report")).save();
}

</script>

</body>
</html>

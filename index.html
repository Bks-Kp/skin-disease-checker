<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

/* CARD */
.card{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:25px;
border-radius:18px;
}

/* HOME */
.home{text-align:center;margin-top:120px;}
.home button{width:250px;margin:10px auto;display:block;}

/* FORM */
.row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin:5px 0;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
font-weight:bold;
cursor:pointer;
}

/* SYMPTOMS */
.symptom-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}
.symptom-item{
display:flex;
justify-content:space-between;
padding:10px;
background:#1e293b;
border-radius:10px;
}

/* POPUP */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
color:black;
padding:20px;
border-radius:10px;
width:90%;
max-width:650px;
max-height:85vh;
overflow:auto;
}

.card2{
background:#f1f5f9;
padding:10px;
margin:10px 0;
border-radius:10px;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="openPatient()">👤 Patient</button>
<button onclick="openDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="login" class="card hidden">
<h2>Doctor Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- PATIENT -->
<div id="patient" class="card hidden">

<h2>🧠 Skin Analyzer</h2>

<input id="name" placeholder="👤 Name">

<div class="row">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option>📍 Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
</select>

<select id="severity">
<option>⚠️ Severity</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">
<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>
<div class="symptom-item">Redness <input type="checkbox" value="red"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>
<div class="symptom-item">Blackheads <input type="checkbox" value="black"></div>
<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
</div>

<button onclick="analyze()">🔍 Analyze</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-box" id="output"></div>
</div>

<script>

/* NAV */
function openPatient(){
home.style.display="none";
patient.classList.remove("hidden");
}

function openDoctor(){
home.style.display="none";
login.classList.remove("hidden");
}

/* LOGIN */
function login(){
if(user.value==="doctor" && pass.value==="1234"){
loadDashboard();
}else alert("Wrong login");
}

/* 🤖 AI ANALYSIS */
function analyze(){

let name=document.getElementById("name").value;
let symptoms=[...document.querySelectorAll("input:checked")].map(x=>x.value);

if(!name){alert("Enter name");return;}
if(symptoms.length===0){alert("Select symptoms");return;}

let scores={
eczema:0,
acne:0,
fungal:0
};

symptoms.forEach(s=>{
if(["itch","dry","red"].includes(s)) scores.eczema+=2;
if(["pimple","black"].includes(s)) scores.acne+=3;
if(["ring"].includes(s)) scores.fungal+=4;
});

let total=Object.values(scores).reduce((a,b)=>a+b,0);

/* REPORT */
let html=`<h2>🧾 Report</h2>`;

for(let k in scores){
let p=total?Math.round(scores[k]/total*100):0;
html+=`${k.toUpperCase()} (${p}%)<br>`;
}

html+=`<canvas id="chart"></canvas>`;

/* SAVE LOCAL */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({name,scores,date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(data));

output.innerHTML=html;
popup.style.display="flex";

/* CHART */
setTimeout(()=>{
new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:Object.keys(scores),
datasets:[{data:Object.values(scores)}]
}
});
},100);
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let counts={};
let html="<h2>Doctor Dashboard</h2>";

data.forEach(d=>{
html+=`<div class="card2">${d.name}</div>`;

for(let k in d.scores){
counts[k]=(counts[k]||0)+d.scores[k];
}
});

html+=`<canvas id="dash"></canvas>`;

output.innerHTML=html;
popup.style.display="flex";

/* GRAPH */
setTimeout(()=>{
new Chart(document.getElementById("dash"),{
type:'pie',
data:{
labels:Object.keys(counts),
datasets:[{data:Object.values(counts)}]
}
});
},100);
}

</script>

</body>
</html>

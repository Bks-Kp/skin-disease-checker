<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

/* HOME */
.home{text-align:center;margin-top:120px;}
.home button{width:60%;margin:10px auto;}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
}

/* FORM */
.form-grid{
display:grid;
grid-template-columns:1fr;
gap:10px;
}

.row-3{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#38bdf8,#06b6d4);
color:white;
cursor:pointer;
font-weight:bold;
}

/* SYMPTOMS */
.symptom-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.symptom-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:90%;
max-width:650px;
max-height:85vh;
overflow:auto;
}

.card{
background:#f1f5f9;
padding:10px;
border-radius:10px;
margin:10px 0;
}

/* GRAPH */
.bar{
height:8px;
background:#38bdf8;
margin:5px 0;
border-radius:5px;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="showPatient()">👤 Patient</button>
<button onclick="showDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
<h2>👨‍⚕️ Doctor Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- PATIENT -->
<div id="app" class="container hidden">

<h2 style="text-align:center;">🧠 Skin Analyzer</h2>

<div class="form-grid">
<input id="name" placeholder="👤 Name">

<div class="row-3">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option>Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
<option>Feet</option>
</select>

<select id="severity">
<option>Severity</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>
</div>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">
<div class="symptom-item">Itching <input type="checkbox" value="itch"></div>
<div class="symptom-item">Dry Skin <input type="checkbox" value="dry"></div>
<div class="symptom-item">Redness <input type="checkbox" value="redness"></div>
<div class="symptom-item">Pimples <input type="checkbox" value="pimple"></div>
<div class="symptom-item">Blackheads <input type="checkbox" value="blackhead"></div>
<div class="symptom-item">Pus <input type="checkbox" value="pus"></div>
<div class="symptom-item">Ring Patch <input type="checkbox" value="ring"></div>
<div class="symptom-item">Scaling <input type="checkbox" value="scaling"></div>
</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="goHome()">⬅ Back</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-content" id="resultBox">
<div id="result"></div>
<button onclick="downloadPDF()">📄 Download PDF</button>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

/* NAV */
function showPatient(){
home.style.display="none";
app.style.display="block";
}
function showDoctor(){
home.style.display="none";
login.style.display="block";
}
function goHome(){location.reload();}

/* LOGIN */
function login(){
if(username.value==="doctor" && password.value==="1234"){
login.style.display="none";
loadDashboard();
}else alert("Wrong login");
}

/* ANALYZE FIXED */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let location=document.getElementById("location").value;
let severity=document.getElementById("severity").value;

let symptoms=[...document.querySelectorAll(".symptom-item input:checked")].map(x=>x.value);

if(!name){alert("Enter name");return;}
if(symptoms.length===0){alert("Select symptoms");return;}

let disease="General Skin Issue";

if(symptoms.includes("pimple")) disease="Acne";
else if(symptoms.includes("ring")) disease="Fungal Infection";
else if(symptoms.includes("itch")) disease="Eczema";

/* POPUP WORKING */
document.getElementById("result").innerHTML=`
<h2 style="text-align:center;">🧾 Patient Report</h2>

<p>👤 <b>${name}</b></p>
<p>🎂 Age: ${age}</p>
<p>📍 Location: ${location}</p>
<p>⚠️ Severity: ${severity}</p>
<p>🦠 Condition: <b>${disease}</b></p>

<hr>

<p>💊 Advice: Maintain hygiene</p>
<p>🛡 Precautions: Avoid touching area</p>
<p>⏳ Recovery: 1-2 weeks</p>
<p>🚨 Doctor: Visit if severe</p>
`;

document.getElementById("popup").style.display="flex";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({name,age,location,severity,disease,date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(data));
}

/* DASHBOARD FULL REPORT */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2>👨‍⚕️ Doctor Dashboard</h2>";

data.forEach(p=>{
html+=`
<div class="card">
<b>${p.name}</b> (${p.age})<br>
📍 ${p.location}<br>
⚠️ ${p.severity}<br>
🦠 ${p.disease}<br>
📅 ${p.date}
</div>`;
});

document.getElementById("result").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

/* CLOSE */
function closePopup(){
popup.style.display="none";
}

/* PDF */
function downloadPDF(){
html2pdf().from(resultBox).save();
}

</script>

</body>
</html>

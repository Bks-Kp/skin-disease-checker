<!DOCTYPE html>
<html>
<head>
<title>Kalpana Skin Clinic</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:'Segoe UI';
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
margin:0;
padding:20px;
}

/* HOME */
.home{text-align:center;margin-top:120px;}
.home button{width:250px;margin:10px auto;display:block;}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
}

/* INPUT STRUCTURE */
.full-width{
width:100%;
margin-bottom:10px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

/* INPUT */
input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
height:45px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#38bdf8,#06b6d4);
color:white;
cursor:pointer;
font-weight:bold;
}

/* PERFECT SYMPTOMS */
.symptom-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.symptom-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:rgba(255,255,255,0.08);
border-radius:10px;
height:45px;
}

.symptom-item span{
flex:1;
text-align:left;
}

.symptom-item input{
margin-left:10px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:20px;
border-radius:12px;
width:90%;
max-width:650px;
max-height:85vh;
overflow:auto;
}

.card{
background:#f1f5f9;
padding:10px;
border-radius:10px;
margin:10px 0;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
<h2>🏥 Kalpana Skin Clinic</h2>
<button onclick="showPatient()">👤 Patient</button>
<button onclick="showDoctor()">👨‍⚕️ Doctor</button>
</div>

<!-- LOGIN -->
<div id="login" class="container hidden">
<h2>👨‍⚕️ Doctor Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="goHome()">⬅ Back</button>
</div>

<!-- PATIENT -->
<div id="app" class="container hidden">

<h2 style="text-align:center;">🧠 Skin Analyzer</h2>

<input id="name" class="full-width" placeholder="👤 Name">

<div class="row">
<input id="age" placeholder="🎂 Age">

<select id="location">
<option>Location</option>
<option>Face</option>
<option>Hands</option>
<option>Legs</option>
<option>Feet</option>
</select>

<select id="severity">
<option>Severity</option>
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>
</div>

<h3>🩺 Symptoms</h3>

<div class="symptom-grid">
<div class="symptom-item"><span>Itching</span><input type="checkbox" value="itch"></div>
<div class="symptom-item"><span>Dry Skin</span><input type="checkbox" value="dry"></div>
<div class="symptom-item"><span>Redness</span><input type="checkbox" value="redness"></div>
<div class="symptom-item"><span>Pimples</span><input type="checkbox" value="pimple"></div>
<div class="symptom-item"><span>Blackheads</span><input type="checkbox" value="blackhead"></div>
<div class="symptom-item"><span>Pus</span><input type="checkbox" value="pus"></div>
<div class="symptom-item"><span>Ring Patch</span><input type="checkbox" value="ring"></div>
<div class="symptom-item"><span>Scaling</span><input type="checkbox" value="scaling"></div>
</div>

<button onclick="analyze()">🔍 Analyze</button>
<button onclick="goHome()">⬅ Back</button>

</div>

<!-- POPUP -->
<div id="popup" class="modal">
<div class="modal-content" id="resultBox">
<div id="result"></div>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

/* NAVIGATION */
function showPatient(){
document.getElementById("home").style.display="none";
document.getElementById("app").style.display="block";
}

function showDoctor(){
document.getElementById("home").style.display="none";
document.getElementById("login").style.display="block"; // FIXED
}

function goHome(){
location.reload();
}

/* LOGIN */
function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u==="doctor" && p==="1234"){
document.getElementById("login").style.display="none";
loadDashboard();
}else{
alert("Invalid Login ❌");
}
}

/* ANALYZE */
function analyze(){

let name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let location=document.getElementById("location").value;
let severity=document.getElementById("severity").value;

let symptoms=[...document.querySelectorAll(".symptom-item input:checked")].map(x=>x.value);

if(!name){alert("Enter name");return;}
if(symptoms.length===0){alert("Select symptoms");return;}

let disease="General Skin Issue";

if(symptoms.includes("pimple")) disease="Acne";
else if(symptoms.includes("ring")) disease="Fungal Infection";
else if(symptoms.includes("itch")) disease="Eczema";

/* POPUP */
document.getElementById("result").innerHTML=`
<h2 style="text-align:center;">🧾 Patient Report</h2>

<p><b>Name:</b> ${name}</p>
<p><b>Age:</b> ${age}</p>
<p><b>Location:</b> ${location}</p>
<p><b>Severity:</b> ${severity}</p>
<p><b>Condition:</b> ${disease}</p>

<hr>

<p>💊 Advice: Maintain hygiene</p>
<p>🛡 Precautions: Avoid touching area</p>
<p>⏳ Recovery: 1-2 weeks</p>
`;

document.getElementById("popup").style.display="flex";

/* SAVE */
let data=JSON.parse(localStorage.getItem("patients")||"[]");
data.push({name,age,location,severity,disease,date:new Date().toLocaleString()});
localStorage.setItem("patients",JSON.stringify(data));
}

/* DASHBOARD */
function loadDashboard(){

let data=JSON.parse(localStorage.getItem("patients")||"[]");

let html="<h2>👨‍⚕️ Doctor Dashboard</h2>";

data.forEach(p=>{
html+=`<div class="card">${p.name} (${p.age}) - ${p.disease}</div>`;
});

document.getElementById("result").innerHTML=html;
document.getElementById("popup").style.display="flex";
}

/* CLOSE */
function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>

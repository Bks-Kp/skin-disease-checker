<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Skin Checker</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .container { max-width:500px; margin:auto; background:white; padding:20px; border-radius:10px; }
    input, select, textarea { width:100%; margin:8px 0; padding:10px; }
    button { padding:10px 20px; background:#007bff; color:white; border:none; border-radius:5px; }
    #result { margin-top:20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🧠 AI Skin Disease Checker</h2>

  <input type="file" id="image" accept="image/*">
  <input type="text" id="name" placeholder="Name">
  <input type="number" id="age" placeholder="Age">

  <select id="gender">
    <option value="">Select Gender</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>

  <input type="text" id="duration" placeholder="Since when (e.g. 2 weeks)">
  <textarea id="symptoms" placeholder="Symptoms"></textarea>
  <input type="text" id="area" placeholder="Affected body area">
  <textarea id="medication" placeholder="Previous medication"></textarea>

  <button onclick="analyze()">Analyze</button>

  <div id="result"></div>
</div>

<script>
async function analyze() {
  const resultDiv = document.getElementById("result");
  resultDiv.innerHTML = "Analyzing...";

  const file = document.getElementById("image").files[0];
  const reader = new FileReader();

  reader.onload = async function() {
    const base64Image = reader.result.split(',')[1];

    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_API_KEY"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          {
            role: "user",
            content: [
              { type: "text", text: `Analyze this skin condition.
              Name: ${name.value}
              Age: ${age.value}
              Gender: ${gender.value}
              Duration: ${duration.value}
              Symptoms: ${symptoms.value}
              Area: ${area.value}
              Medication: ${medication.value}

              Give:
              1. Possible condition
              2. Severity
              3. General care advice
              4. Disclaimer to consult doctor` },
              { type: "image_url", image_url: { url: `data:image/jpeg;base64,${base64Image}` } }
            ]
          }
        ]
      })
    });

    const data = await response.json();
    resultDiv.innerHTML = data.choices[0].message.content;
  };

  reader.readAsDataURL(file);
}
</script>

</body>
</html>

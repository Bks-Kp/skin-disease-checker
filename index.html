<!DOCTYPE html>
<html>
<head>
  <title>Skin Checker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #1e293b;
      color: white;
      padding: 20px;
    }

    input, textarea, select, button {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
    }

    img {
      max-width: 250px;
      margin-top: 10px;
      border-radius: 10px;
    }

    #prescription {
      margin-top: 20px;
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<h2>🧠 Skin Disease Checker</h2>

<input type="file" id="image" accept="image/*">
<img id="preview">

<input type="text" id="name" placeholder="Name">
<input type="number" id="age" placeholder="Age">

<select id="gender">
  <option value="">Select Gender</option>
  <option>Male</option>
  <option>Female</option>
</select>

<textarea id="symptoms" placeholder="Enter symptoms"></textarea>

<button onclick="analyze()">Generate Prescription</button>

<div id="prescription"></div>

<script>

// Image Preview
document.getElementById("image").addEventListener("change", function() {
  const file = this.files[0];
  const reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById("preview").src = e.target.result;
  };

  if (file) reader.readAsDataURL(file);
});

// Analyze
function analyze() {
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;
  const gender = document.getElementById("gender").value;
  const symptoms = document.getElementById("symptoms").value.toLowerCase();

  let disease = "Unknown condition";
  let advice = "Consult a dermatologist.";
  let medicine = "N/A";

  if (symptoms.includes("itch") || symptoms.includes("rash")) {
    disease = "Eczema / Skin Allergy";
    advice = "Keep skin moisturized and avoid irritants.";
    medicine = "Moisturizing cream (OTC)";
  }

  else if (symptoms.includes("pimple") || symptoms.includes("acne")) {
    disease = "Acne";
    advice = "Wash face regularly and avoid oily products.";
    medicine = "Salicylic acid face wash (OTC)";
  }

  else if (symptoms.includes("patch") || symptoms.includes("white")) {
    disease = "Fungal Infection";
    advice = "Keep area dry and clean.";
    medicine = "Antifungal cream (OTC)";
  }

  const prescription = `
🧾 DIGITAL PRESCRIPTION

Patient Name: ${name}
Age: ${age}
Gender: ${gender}

----------------------------------

Possible Condition:
${disease}

----------------------------------

Recommended Care:
${advice}

----------------------------------

Suggested OTC Medicine:
${medicine}

----------------------------------

⚠️ Note:
This is NOT a medical diagnosis.
Please consult a qualified doctor.

👨‍⚕️ - AI Health Assistant
`;

  document.getElementById("prescription").innerText = prescription;
}

</script>

</body>
</html>
